name: Update word cloud

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect configured sources
        run: |
          if [ -f data/sources.json ]; then
            python src/collect.py
          else
            echo "data/sources.json is missing; skipping collection."
          fi
      - name: Build word cloud
        run: python src/analyze.py
      - name: Commit generated docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated word cloud"
          file_pattern: docs/wordcloud.json docs/wordcloud.svg
